<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="font-size: 30px;">
    <p>Multiply every element in the array with 10:</p>
    
    <p id="result"></p>
    
    <script>

        var numbers = [4, 8, 3, 6]

        var newArray = numbers.map(item => item * 10);

        document.getElementById("result").innerHTML = newArray;

    </script>
</body>
</html>
