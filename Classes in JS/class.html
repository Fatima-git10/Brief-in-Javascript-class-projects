<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Animal{
            constructor(name,age){
                this.name=name
                this.age=age
            }
        }
        let cat= new Animal("Rosa",4)
        document.write(cat.name)
        document.write("<br>")
        document.write(cat.age)
    </script>
</body>
